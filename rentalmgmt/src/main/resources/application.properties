spring.application.name=rentalmgmt
#debug=true
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
# TRACE > DEBUG > INFO > WARN > ERROR
logging.level.root=${LOG_LEVEL:INFO}

# save log in a file (Using a relative path so it works on any machine)
logging.file.name=${LOG_FILE_NAME:../logs/app.log}

# save log in json format so we can do more with it in cloud logging tool or ELK tool
logging.pattern.file={"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%c","message":"%m"}

spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:rental_mgmt}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.show-sql=${JPA_SHOW_URL:true}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}

rentalmgmt.cors.allowed-origins=http://localhost:5173